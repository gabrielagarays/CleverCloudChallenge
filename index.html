<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Modo responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clever Cloud Challenge</title>

    <!-- Typography (Dela Gothic One / Poppins) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="titulo-principal">CLEVER CLOUD<br />CHALLENGE</h1>
    </header>

    <main class="contenedor-cards">
      <!-- CARD 1 -->
      <div class="card">
        <h2 class="card-titulo">SUMA DE DÍGITOS</h2>
        <input
          type="number"
          id="numero-input"
          class="card-input"
          placeholder="ej: 12345"
        />
        <div id="resultado-suma" class="card-resultado"></div>
        <button id="btn-suma" class="card-boton">Calcular</button>
      </div>

      <!-- CARD 2 -->
      <div class="card">
        <h2 class="card-titulo">PALÍNDROMO</h2>
        <input
          type="text"
          id="palabra-input"
          class="card-input"
          placeholder="ej: salas"
        />
        <div id="resultado-palindromo" class="card-resultado"></div>
        <button id="btn-palindromo" class="card-boton">Verificar</button>
      </div>

      <!-- CARD 3 -->
      <div class="card">
        <h2 class="card-titulo">ORDENAMIENTO</h2>
        <input
          type="text"
          id="lista-input"
          class="card-input"
          placeholder="ej: 5, -2, 10"
        />
        <div id="resultado-ordenamiento" class="card-resultado"></div>
        <button id="btn-ordenar" class="card-boton">Ordenar</button>
      </div>
    </main>

    <!-- Footer -->

    <footer class="footer">
      <div class="footer-texto">
        <p>© 2026 Gabriela Garay. All rights reserved.</p>
        <p>
          Built with HTML, CSS &amp; JavaScript for the Clever Cloud Challenge
        </p>
      </div>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
